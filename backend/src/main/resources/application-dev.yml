# ─── 开发环境配置 ───
# 使用方式: MySQL 本地运行，后端 VS Code 直接启动

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  datasource:
    url: jdbc:mysql://localhost:3306/power_load?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver

# ML 推理服务
ml:
  service:
    url: http://localhost:5000

# LLM API（API Key 为空时使用 Mock 模式，应用仍可启动）
llm:
  api:
    key: ${LLM_API_KEY:}
    url: ${LLM_API_URL:https://api.deepseek.com/v1}
    model: ${LLM_MODEL:deepseek-chat}
    timeout-seconds: 30

# 开发日志
logging:
  level:
    com.powerload: debug

# JWT 配置（开发环境默认密钥，生产环境必须通过 JWT_SECRET 环境变量覆盖）
jwt:
  secret: ${JWT_SECRET:power-load-dev-jwt-secret-key-32chars}
  access-expiration-ms: 1800000
  refresh-expiration-ms: 604800000

# 仅开发环境开放负荷异常演示控制
demo:
  enabled: true
